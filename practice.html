<!DOCTYPE html>
<html>
    <head>
        <title>
        student performance app 
        </title>
        <style>
            body {
  padding: 13px;
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

#heading {
  text-align: center;
  color: white;
  font-style: italic;
}

#box {
  background: white;
  padding: 20px;
  border-radius: 13px;
  max-width: 350px;
  margin: auto;
}

label {
  display: block;
  margin-top: 10px;
  font-weight: 600;
  color: #444;
}

#input, input[type="text"], input[type="number"] {
  padding: 10px;
  margin-top: 5px;
  width: 100%;
  border-radius: 8px;
  border: 1.5px solid #ddd;
  font-size: 15px;
}

#button {
  margin-top: 15px;
  padding: 10px;
  width: 100%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}


#result {
  margin-top: 20px;
  padding: 15px;
  border: 2px solid #ddd;
  border-radius: 10px;
  color: #333;
  min-height: 50px;
}
        
        </style>
  </head>

   <body>
    <div id="heading" ><h2> student activity performance </h2></div>

    <div id = "box"> 
  
<label> student name:</label>
    <br><input type="text" id="name" placeholder="enter your name">


    <label> assignment:</label>
 <br> <input type="number" id="assignment" placeholder="enter your total assignments">


 <label> quiz:</label>
<br> <input type="number" id="quiz" placeholder="enter your total quiz">


<label> attendance:</label>
<br> <input type="number" id="attendance" placeholder="enter your attendance ">
 
</div input>
   <input id="button" onclick="analyze()">analyze 
</div>

 <div result>

 </div>
    </div>

            {

        let attendance = parseInt(document.getElementByid("attendance").value);
       let assignment = parseInt( document.getElementById("assignment").value);

       let status = "";
       let color = "";

if (attendance < 50) {
                status = "Warning";
                color = "red";
            } else if (quiz > 5 && assignments >= 5) {
                status = "Excellent";
                color = "green";
            } else if (quiz >= 2  && quiz <= 70) {
                status = "Average";
                color = "orange";
            } else {
                status = "Needs Improvement";
                color = "red";

     document.getElementById("result").innerHTML=

     `;
     document.getElementById("result").style.color = color;
        }

   </body>
    
</html>
